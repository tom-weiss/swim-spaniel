<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Dive through the reefs around the Komodo Islands, rescue stranded spaniels, and drive away a giant Komodo dragon." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#083344" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Swim, Spaniel!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tom-weiss.github.io/swim-spaniel/" />
    <meta property="og:site_name" content="Swim, Spaniel!" />
    <meta property="og:title" content="Swim, Spaniel!" />
    <meta property="og:description" content="Rescue spaniels beneath the Komodo seas and face a giant swimming dragon." />
    <meta property="og:image" content="https://tom-weiss.github.io/swim-spaniel/og-image.png" />
    <meta property="og:image:alt" content="Swim, Spaniel! pixel artwork with a scuba diver, spaniel, coral reef, and Komodo dragon." />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Swim, Spaniel!" />
    <meta name="twitter:description" content="Rescue spaniels beneath the Komodo seas and face a giant swimming dragon." />
    <meta name="twitter:image" content="https://tom-weiss.github.io/swim-spaniel/og-image.png" />
    <meta name="twitter:image:alt" content="Swim, Spaniel! pixel artwork with a scuba diver, spaniel, coral reef, and Komodo dragon." />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="canonical" href="https://tom-weiss.github.io/swim-spaniel/" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>Swim, Spaniel!</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #083344;
        color: #e2e8f0;
        font-family: "Press Start 2P", monospace;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }
      .shell {
        position: relative;
        padding: 16px;
        border: 4px solid #2dd4bf;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(45, 212, 191, 0.35);
        width: fit-content;
        max-width: 100vw;
        max-height: 100dvh;
        box-sizing: border-box;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px;
        font-family: monospace;
        font-size: 14px;
        color: #e2e8f0;
      }
      canvas {
        image-rendering: pixelated;
        width: min(360px, calc(100vw - 44px));
        height: auto;
        aspect-ratio: 9 / 16;
        max-height: calc(100dvh - 170px);
        display: block;
        border: 2px solid #e2e8f0;
        background: #0e7490;
        touch-action: none;
      }
      p {
        font-family: monospace;
        margin: 8px 0 0;
      }
      .splash {
        position: absolute;
        inset: 16px;
        display: grid;
        place-items: center;
        background: rgba(8, 51, 68, 0.96);
        border: 2px solid #2dd4bf;
        border-radius: 10px;
        z-index: 3;
      }
      .splash.hidden {
        display: none;
      }
      .splash-panel {
        max-width: 300px;
        text-align: center;
        padding: 14px;
      }
      .splash-roster {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 12px;
      }
      .splash-character {
        margin: 0;
        display: grid;
        place-items: center;
        gap: 6px;
      }
      .splash-character img {
        width: 58px;
        height: 58px;
        image-rendering: pixelated;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #164e63;
        padding: 4px;
        box-sizing: border-box;
      }
      .splash-character figcaption {
        font-family: monospace;
        font-size: 10px;
        color: #cbd5e1;
      }
      .splash h1 {
        font-size: 18px;
        margin: 8px 0 12px;
        color: #f8fafc;
      }
      .splash p {
        margin: 0 0 12px;
        line-height: 1.45;
        color: #a5f3fc;
      }
      .splash button {
        border: 2px solid #2dd4bf;
        border-radius: 8px;
        background: #0f766e;
        color: #f8fafc;
        font-family: inherit;
        padding: 10px 14px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      .mute-toggle {
        margin: 0 0 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: monospace;
        color: #a5f3fc;
      }
      .mute-toggle input {
        width: 16px;
        height: 16px;
      }
      .controls {
        display: none;
        gap: 10px;
        margin-top: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: stretch;
        touch-action: none;
      }
      .control {
        flex: 1;
        border: 2px solid #2dd4bf;
        border-radius: 8px;
        padding: 10px;
        background: #1e293b;
        color: #e2e8f0;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
        font-size: 12px;
      }
      .control svg {
        width: 24px;
        height: 24px;
        fill: #e2e8f0;
      }
      @media (pointer: coarse) {
        .controls {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="status-bar" aria-live="polite">
        <span id="status-score">Score 0</span>
        <span id="status-air">Air 3</span>
        <span id="status-level">Level 1</span>
      </div>
      <div id="splash-screen" class="splash">
        <div class="splash-panel">
          <div class="splash-roster" aria-label="Characters">
            <figure class="splash-character">
              <img src="./docs/images/obstacles/diver.svg" alt="Scuba rescue diver" />
              <figcaption>DIVER</figcaption>
            </figure>
            <figure class="splash-character">
              <img src="./docs/images/obstacles/spaniel.svg" alt="Spaniel awaiting rescue" />
              <figcaption>SPANIEL</figcaption>
            </figure>
            <figure class="splash-character">
              <img src="./docs/images/obstacles/komodo.svg" alt="Giant Komodo dragon boss" />
              <figcaption>KOMODO</figcaption>
            </figure>
          </div>
          <h1 id="splash-title">SWIM, SPANIEL!</h1>
          <p id="splash-copy">Swim through the Komodo reefs, rescue spaniels, and boost past marine hazards.</p>
          <label class="mute-toggle" for="splash-mute-toggle">
            <input id="splash-mute-toggle" type="checkbox" />
            Mute sound
          </label>
          <button id="splash-start" type="button">START</button>
        </div>
      </div>
      <canvas id="game" width="360" height="640"></canvas>
      <div class="controls" aria-label="Touch controls">
        <button id="control-left" class="control" aria-label="Move left">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true"><path d="M15.4 4.6a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.99 4.99a1 1 0 0 1-1.41 1.41l-6.7-6.69a1 1 0 0 1 0-1.42l6.7-6.69a1 1 0 0 1 1.41 0Z"/></svg>
        </button>
        <button id="control-jump" class="control" aria-label="Swim boost">BOOST</button>
        <button id="control-right" class="control" aria-label="Move right">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true"><path d="M8.6 19.4a1 1 0 0 1 0-1.4L13.59 13H4a1 1 0 1 1 0-2h9.59L8.6 6.01A1 1 0 1 1 10.01 4.6l6.7 6.69a1 1 0 0 1 0 1.42l-6.7 6.69a1 1 0 0 1-1.41 0Z"/></svg>
        </button>
      </div>
    </div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
